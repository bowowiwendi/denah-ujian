<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Denah Ujian - NISN Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat-grid {
            display: grid;
            gap: 1rem;
        }
        @media print {
            .no-print { display: none !important; }
            .print-area { width: 100%; margin: 0; padding: 0; }
            .page-break { 
                page-break-after: always; 
                break-after: page;
                padding: 20px;
            }
            body { background-color: white; }
            .bg-white { box-shadow: none !important; border: 1px solid #ddd; }
        }
        .photo-box {
            width: 55px;
            height: 70px;
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto p-4 md:p-8">
        <header class="mb-8 text-center no-print">
            <h1 class="text-3xl font-bold text-blue-900">SISTEM DENAH UJIAN</h1>
            <p class="text-gray-600">Mode Foto Berbasis NISN</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Panel Kontrol -->
            <div class="lg:w-1/3 space-y-6 no-print">
                
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                    <h2 class="text-lg font-bold mb-4">1. Upload CSV Siswa</h2>
                    <input type="file" id="csvFileInput" accept=".csv" class="block w-full text-sm mb-4">
                    <button onclick="handleFileUpload()" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold hover:bg-green-700">Proses Data</button>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                    <h2 class="text-lg font-bold mb-4">2. Pengaturan Foto</h2>
                    <p class="text-xs text-gray-500 mb-3 italic">Nama file foto harus: <strong>NISN.jpg</strong><br>Simpan di folder "foto" satu lokasi dengan file ini.</p>
                    <select id="imgExt" class="w-full p-2 border rounded-md">
                        <option value="jpg">Ekstensi .jpg</option>
                        <option value="png">Ekstensi .png</option>
                    </select>
                </div>

                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500">
                    <h2 class="text-lg font-bold mb-4">3. Layout Ruangan</h2>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="text-xs">Baris</label>
                            <input type="number" id="rowsInput" value="5" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="text-xs">Kolom</label>
                            <input type="number" id="colsInput" value="4" class="w-full p-2 border rounded">
                        </div>
                    </div>
                    <button onclick="generateDenah()" class="w-full bg-purple-600 text-white py-2 rounded-lg font-bold hover:bg-purple-700">Buat Denah</button>
                </div>

                <button onclick="window.print()" class="w-full bg-gray-800 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-black transition">CETAK SEKARANG</button>
            </div>

            <!-- Tampilan Denah -->
            <div id="printContainer" class="lg:flex-1 print-area">
                <div class="bg-white p-12 rounded-xl shadow-md text-center text-gray-400 italic">
                    Silakan unggah file CSV dan klik "Buat Denah"
                </div>
            </div>
        </div>
    </div>

    <script>
        let participants = [];

        function handleFileUpload() {
            const fileInput = document.getElementById('csvFileInput');
            if (!fileInput.files[0]) return alert("Pilih file CSV!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                participants = [];
                let dataStart = false;

                for (let line of lines) {
                    const cols = line.split(',');
                    // Mencari baris header untuk mulai mengambil data
                    if (line.toLowerCase().includes('nomor peserta')) {
                        dataStart = true;
                        continue;
                    }
                    
                    if (dataStart && cols.length >= 4) {
                        const noPeserta = cols[1]?.trim();
                        const nisn = cols[2]?.trim(); // Kolom ke-3 adalah NISN
                        const nama = cols[3]?.trim();
                        
                        if (noPeserta && nama) {
                            participants.push({ noPeserta, nisn, nama });
                        }
                    }
                }
                alert(`Data Berhasil Dimuat: ${participants.length} Siswa.`);
            };
            reader.readAsText(fileInput.files[0]);
        }

        function generateDenah() {
            const rows = parseInt(document.getElementById('rowsInput').value);
            const cols = parseInt(document.getElementById('colsInput').value);
            const ext = document.getElementById('imgExt').value;
            const cap = rows * cols;
            const container = document.getElementById('printContainer');
            
            if (participants.length === 0) return alert("Belum ada data!");
            
            container.innerHTML = '';
            const totalRuang = Math.ceil(participants.length / cap);

            for (let r = 0; r < totalRuang; r++) {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'bg-white p-6 mb-8 rounded-xl shadow-md page-break border border-gray-100';
                
                const roomData = participants.slice(r * cap, (r + 1) * cap);
                
                roomDiv.innerHTML = `
                    <div class="text-center mb-4 border-b-2 border-double border-black pb-2">
                        <h2 class="text-lg font-bold uppercase">DENAH TEMPAT DUDUK - RUANG ${r+1}</h2>
                        <p class="text-[10px] text-gray-500 italic">Pencetakan Otomatis Berbasis NISN</p>
                    </div>

                    <div class="mb-4 text-center">
                        <div class="inline-block px-10 py-1 border border-gray-400 font-bold bg-gray-50 text-[10px]">PAPAN TULIS / PENGAWAS</div>
                    </div>

                    <div class="seat-grid" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr))">
                        ${roomData.map(p => `
                            <div class="border border-black rounded p-1.5 flex flex-row items-center gap-2 bg-white h-24">
                                <div class="photo-box flex-shrink-0">
                                    <!-- Foto menggunakan NISN sebagai nama file -->
                                    <img src="foto/${p.nisn}.${ext}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nama)}&background=f9fafb&color=d1d5db&size=128'" alt="Siswa">
                                </div>
                                <div class="flex-1 overflow-hidden">
                                    <p class="text-[8px] font-black text-blue-800 leading-none mb-0.5">${p.noPeserta}</p>
                                    <p class="text-[10px] font-bold leading-tight uppercase mb-0.5 truncate">${p.nama}</p>
                                    <p class="text-[8px] text-gray-500 font-medium">NISN: ${p.nisn}</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(roomDiv);
            }
        }
    </script>
</body>
</html>
