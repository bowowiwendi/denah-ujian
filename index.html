<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Denah Ujian - Ringkas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat-grid {
            display: grid;
            gap: 0.75rem;
        }
        @media print {
            .no-print { display: none !important; }
            .print-area { width: 100%; margin: 0; padding: 0; }
            .page-break { 
                page-break-after: always; 
                break-after: page;
                padding: 10px;
            }
            body { background-color: white; }
            .bg-white { box-shadow: none !important; border: none !important; }
        }
        .photo-box {
            width: 80px;
            height: 100px;
            background-color: #f3f4f6;
            border: 1px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-meja {
            border: 1.5px solid #000;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            background-color: #fff;
            min-height: 180px; /* Sedikit lebih pendek karena detail dikurangi */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto p-4 md:p-8 no-print">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-blue-900">SISTEM DENAH UJIAN</h1>
            <p class="text-gray-600 italic">Tampilan Ringkas - Tanpa Kelas & NISN</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                <h2 class="font-bold mb-4">1. Unggah CSV</h2>
                <input type="file" id="csvFileInput" accept=".csv" class="block w-full text-sm mb-4">
                <button onclick="handleFileUpload()" class="w-full bg-green-600 text-white py-2 rounded font-bold">Proses Data</button>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <h2 class="font-bold mb-4">2. Pengaturan Ruang</h2>
                <div class="grid grid-cols-2 gap-2 mb-4 text-xs">
                    <div>Baris: <input type="number" id="rowsInput" value="5" class="w-full p-1 border"></div>
                    <div>Kolom: <input type="number" id="colsInput" value="4" class="w-full p-1 border"></div>
                </div>
                <select id="imgExt" class="w-full p-1 border text-sm">
                    <option value="jpg">Foto (.jpg)</option>
                    <option value="png">Foto (.png)</option>
                </select>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-purple-500 flex flex-col justify-between">
                <div>
                    <h2 class="font-bold mb-2">3. Buat Denah</h2>
                    <p id="statInfo" class="text-xs text-gray-500 italic mb-4">Belum ada data diimpor</p>
                </div>
                <button onclick="generateDenah()" class="w-full bg-purple-600 text-white py-2 rounded font-bold">Tampilkan Denah</button>
            </div>
        </div>

        <button onclick="window.print()" class="w-full bg-black text-white py-4 rounded-xl font-bold shadow-lg flex items-center justify-center gap-2">
            CETAK SEMUA RUANG
        </button>
    </div>

    <!-- Area Cetak -->
    <div id="printContainer" class="print-area p-4">
        <!-- Hasil Denah Akan Muncul Di Sini -->
    </div>

    <script>
        let participants = [];

        function cleanName(name) {
            if (!name) return "";
            // Menghapus semua karakter titik (.) dari nama
            return name.replace(/\./g, '').trim();
        }

        function handleFileUpload() {
            const fileInput = document.getElementById('csvFileInput');
            if (!fileInput.files[0]) return alert("Pilih file CSV!");

            const reader = new FileReader();
            reader.onload = (e) => {
                const lines = e.target.result.split('\n');
                participants = [];
                let dataStart = false;

                for (let line of lines) {
                    const cols = line.split(',');
                    if (line.toLowerCase().includes('nomor peserta')) {
                        dataStart = true;
                        continue;
                    }
                    
                    if (dataStart && cols.length >= 4) {
                        const noPeserta = cols[1]?.trim();
                        const nisn = cols[2]?.trim();
                        const rawNama = cols[3]?.trim();
                        
                        if (noPeserta && rawNama) {
                            participants.push({ 
                                noPeserta, 
                                nisn, 
                                nama: cleanName(rawNama)
                            });
                        }
                    }
                }
                document.getElementById('statInfo').innerText = `Total: ${participants.length} Siswa`;
                alert(`Data Berhasil Dimuat: ${participants.length} Siswa.`);
            };
            reader.readAsText(fileInput.files[0]);
        }

        function generateDenah() {
            const rows = parseInt(document.getElementById('rowsInput').value);
            const cols = parseInt(document.getElementById('colsInput').value);
            const ext = document.getElementById('imgExt').value;
            const cap = rows * cols;
            const container = document.getElementById('printContainer');
            
            if (participants.length === 0) return alert("Belum ada data!");
            
            container.innerHTML = '';
            const totalRuang = Math.ceil(participants.length / cap);

            for (let r = 0; r < totalRuang; r++) {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'page-break mb-10';
                
                const roomData = participants.slice(r * cap, (r + 1) * cap);
                
                roomDiv.innerHTML = `
                    <div class="text-center mb-6 border-b-2 border-black pb-2">
                        <h1 class="text-2xl font-bold uppercase">DENAH TEMPAT DUDUK PESERTA UJIAN</h1>
                        <h2 class="text-xl font-bold">RUANG ${r+1}</h2>
                    </div>

                    <div class="mb-6 text-center">
                        <div class="inline-block px-12 py-2 border-2 border-black font-bold bg-gray-100 uppercase">MEJA PENGAWAS / PAPAN TULIS</div>
                    </div>

                    <div class="seat-grid" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr))">
                        ${roomData.map(p => `
                            <div class="card-meja">
                                <div class="photo-box">
                                    <img src="foto/${p.nisn}.${ext}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(p.nama)}&background=ffffff&color=000000&size=128&bold=true'" alt="Siswa">
                                </div>
                                <div class="w-full flex flex-col justify-center flex-grow">
                                    <p class="text-[12px] font-bold leading-tight uppercase mb-2">${p.nama}</p>
                                    <div class="border-t border-black pt-2">
                                        <p class="text-[11px] font-bold text-blue-800">${p.noPeserta}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(roomDiv);
            }
        }
    </script>
</body>
</html>
