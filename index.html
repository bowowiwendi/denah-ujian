<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Denah Ujian Multi-Ruang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat-grid {
            display: grid;
            gap: 1rem;
        }
        .seat-card {
            transition: all 0.2s ease;
        }
        @media print {
            /* Sembunyikan elemen yang tidak perlu dicetak */
            .no-print, button, input, .header-main { 
                display: none !important; 
            }
            /* Pastikan kontainer utama mengambil lebar penuh */
            .container { 
                width: 100% !important; 
                max-width: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .print-area { 
                width: 100%; 
                margin: 0; 
                padding: 0; 
            }
            /* Paksa ganti halaman setiap ruang */
            .page-break { 
                page-break-after: always; 
                break-after: page;
                margin-bottom: 0;
                padding: 20px;
                border: none !important;
                shadow: none !important;
            }
            body { 
                background-color: white; 
            }
            .bg-white { 
                box-shadow: none !important; 
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="container mx-auto p-4 md:p-8">
        <!-- Header -->
        <header class="mb-8 text-center no-print header-main">
            <h1 class="text-3xl font-bold text-blue-800">Sistem Denah Ujian Multi-Ruang</h1>
            <p class="text-gray-600">Otomatis membagi peserta ke beberapa ruang kelas</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Panel Kontrol (Kiri) -->
            <div class="lg:w-1/3 space-y-6 no-print">
                
                <!-- Impor Data -->
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-500">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">1. Unggah Data</h2>
                    <input type="file" id="csvFileInput" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 mb-4">
                    <button onclick="handleFileUpload()" class="w-full bg-green-600 text-white py-2 rounded-md hover:bg-green-700 transition font-bold">Proses Data File</button>
                </div>

                <!-- Konfigurasi Ruang -->
                <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                    <h2 class="text-xl font-semibold mb-4 border-b pb-2">2. Kapasitas Per Ruang</h2>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Baris</label>
                            <input type="number" id="rowsInput" value="5" min="1" class="w-full mt-1 p-2 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Kolom</label>
                            <input type="number" id="colsInput" value="4" min="1" class="w-full mt-1 p-2 border rounded-md">
                        </div>
                    </div>
                    <p class="text-xs text-blue-600 font-medium mb-4">* Kapasitas: <span id="capDisplay">20</span> meja per ruang.</p>
                    <button onclick="updateConfig()" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">Update Kapasitas</button>
                </div>

                <!-- Status Antrean -->
                <div class="bg-white p-6 rounded-xl shadow-md">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl font-semibold">3. Ringkasan Data</h2>
                        <span id="participantCount" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded-full">0 Siswa</span>
                    </div>
                    <div id="roomSummary" class="text-sm space-y-2 mb-4 text-gray-600">
                        <!-- Info jumlah ruang akan muncul di sini -->
                    </div>
                    <div class="flex gap-2">
                        <button onclick="generateDenah()" class="flex-1 bg-purple-600 text-white py-2 rounded-md font-bold hover:bg-purple-700">Buat Denah</button>
                        <button onclick="clearAll()" class="flex-1 bg-red-500 text-white py-2 rounded-md hover:bg-red-600">Reset</button>
                    </div>
                </div>

                <!-- Tombol Cetak yang Diperbaiki -->
                <button type="button" onclick="triggerPrint()" class="w-full bg-gray-800 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-gray-900 transition flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    CETAK SEMUA RUANG
                </button>
            </div>

            <!-- Area Denah (Kanan) -->
            <div id="printContainer" class="lg:flex-1 print-area">
                <div class="bg-white p-8 rounded-xl shadow-md text-center text-gray-400 italic">
                    Belum ada denah yang dibuat. Silakan unggah data dan klik "Buat Denah".
                </div>
            </div>
        </div>
    </div>

    <script>
        let participants = [];
        let rows = 5;
        let cols = 4;

        // Fungsi Cetak yang lebih stabil
        function triggerPrint() {
            if (participants.length === 0) {
                alert("Tidak ada data untuk dicetak. Mohon unggah file dan buat denah terlebih dahulu.");
                return;
            }
            // Pastikan denah sudah digenerate ulang sebelum print
            generateDenah();
            
            // Berikan waktu sejenak agar browser merender elemen
            setTimeout(() => {
                window.print();
            }, 500);
        }

        function updateConfig() {
            rows = parseInt(document.getElementById('rowsInput').value);
            cols = parseInt(document.getElementById('colsInput').value);
            document.getElementById('capDisplay').innerText = rows * cols;
            if (participants.length > 0) updateRoomSummary();
        }

        function handleFileUpload() {
            const fileInput = document.getElementById('csvFileInput');
            const file = fileInput.files[0];
            if (!file) return alert("Pilih file CSV!");

            const reader = new FileReader();
            reader.onload = (e) => processCSV(e.target.result);
            reader.readAsText(file);
        }

        function processCSV(csvText) {
            const lines = csvText.split('\n');
            participants = [];
            let dataStartIndex = -1;

            for(let i = 0; i < lines.length; i++) {
                if(lines[i].toLowerCase().includes('nomor peserta') && lines[i].toLowerCase().includes('nama')) {
                    dataStartIndex = i + 1;
                    break;
                }
            }

            if(dataStartIndex === -1) return alert("Kolom 'Nomor Peserta' atau 'NAMA' tidak ditemukan.");

            for (let i = dataStartIndex; i < lines.length; i++) {
                const columns = lines[i].split(',');
                if (columns.length >= 4) {
                    const id = columns[1]?.trim();
                    const name = columns[3]?.trim();
                    if(id && name) participants.push({ id, name });
                }
            }

            document.getElementById('participantCount').innerText = `${participants.length} Siswa`;
            updateRoomSummary();
            alert(`Berhasil mengimpor ${participants.length} siswa.`);
        }

        function updateRoomSummary() {
            const cap = rows * cols;
            const roomCount = Math.ceil(participants.length / cap);
            const summary = document.getElementById('roomSummary');
            summary.innerHTML = `
                <p>• Total Siswa: <strong>${participants.length}</strong></p>
                <p>• Kapasitas Meja: <strong>${cap}</strong></p>
                <p>• Dibutuhkan: <strong>${roomCount} Ruang</strong></p>
            `;
        }

        function generateDenah() {
            const cap = rows * cols;
            const container = document.getElementById('printContainer');
            container.innerHTML = '';

            if (participants.length === 0) {
                container.innerHTML = '<div class="bg-white p-8 rounded-xl shadow-md text-center text-gray-400 italic no-print">Data kosong.</div>';
                return;
            }

            const roomCount = Math.ceil(participants.length / cap);

            for (let r = 0; r < roomCount; r++) {
                const roomDiv = document.createElement('div');
                roomDiv.className = 'bg-white p-8 rounded-xl shadow-md mb-8 page-break';
                
                const startIdx = r * cap;
                const endIdx = Math.min(startIdx + cap, participants.length);
                const roomParticipants = participants.slice(startIdx, endIdx);

                roomDiv.innerHTML = `
                    <div class="text-center mb-6 border-b-2 border-black pb-4">
                        <h2 class="text-2xl font-bold uppercase">Denah Tempat Duduk - RUANG ${r + 1}</h2>
                        <p class="text-sm">Jumlah Peserta: ${roomParticipants.length} (Urutan ${startIdx + 1} - ${endIdx})</p>
                    </div>

                    <div class="mb-8 text-center">
                        <div class="inline-block px-10 py-2 border-2 border-gray-400 font-bold text-gray-500 rounded bg-gray-50">PAPAN TULIS / MEJA PENGAWAS</div>
                    </div>

                    <div class="seat-grid" style="grid-template-columns: repeat(${cols}, minmax(0, 1fr))">
                        ${generateSeatsHTML(roomParticipants)}
                    </div>

                    <div class="hidden print:flex justify-between mt-12 text-sm">
                        <div class="text-center">
                            <p>Pengawas Ruang,</p>
                            <div class="h-16"></div>
                            <p>( ................................ )</p>
                        </div>
                        <div class="text-center">
                            <p>Panitia Ujian,</p>
                            <div class="h-16"></div>
                            <p>( ................................ )</p>
                        </div>
                    </div>
                `;
                container.appendChild(roomDiv);
            }
        }

        function generateSeatsHTML(roomParticipants) {
            let html = '';
            const totalMeja = rows * cols;

            for (let i = 0; i < totalMeja; i++) {
                const p = roomParticipants[i];
                if (p) {
                    html += `
                        <div class="border-2 border-blue-500 rounded-lg p-2 aspect-[4/3] flex flex-col items-center justify-between bg-white shadow-sm">
                            <div class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center border border-gray-200">
                                <svg class="w-6 h-6 text-gray-300" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>
                            </div>
                            <div class="text-center">
                                <p class="text-[8px] font-black text-blue-500 tracking-tighter">${p.id}</p>
                                <p class="text-[10px] font-bold leading-none text-gray-800 line-clamp-2 mt-1 uppercase">${p.name}</p>
                            </div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="border-2 border-dashed border-gray-200 rounded-lg aspect-[4/3] flex items-center justify-center text-[10px] text-gray-300 font-bold uppercase">
                            Kosong
                        </div>
                    `;
                }
            }
            return html;
        }

        function clearAll() {
            if(confirm("Hapus semua data?")) {
                participants = [];
                document.getElementById('participantCount').innerText = "0 Siswa";
                document.getElementById('roomSummary').innerHTML = "";
                document.getElementById('printContainer').innerHTML = '<div class="bg-white p-8 rounded-xl shadow-md text-center text-gray-400 italic no-print">Data dihapus.</div>';
            }
        }

        window.onload = updateConfig;
    </script>
</body>
</html>
